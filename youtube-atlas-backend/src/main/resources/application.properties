spring.application.name=youtube-atlas-backend
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:${DB_FALLBACK_URL:jdbc:h2:mem:youtube-atlas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:${DB_DRIVER:}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true

atlas.youtube.api-base-url=${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
atlas.youtube.api-key=${YOUTUBE_API_KEY:}
atlas.youtube.category-language=${YOUTUBE_CATEGORY_LANGUAGE:ko}
atlas.youtube.max-results-per-category=50
atlas.youtube.shorts-max-duration-seconds=180

atlas.realtime.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

atlas.trending.scheduler-enabled=${TRENDING_SCHEDULER_ENABLED:false}
atlas.trending.cron=${TRENDING_SYNC_CRON:0 0/30 * * * *}

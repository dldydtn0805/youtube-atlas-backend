spring.application.name=youtube-atlas-backend
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:${DB_FALLBACK_URL:jdbc:h2:mem:youtube-atlas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:${DB_DRIVER:}}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true

atlas.youtube.api-base-url=${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
atlas.youtube.api-key=${YOUTUBE_API_KEY:}
atlas.youtube.category-language=${YOUTUBE_CATEGORY_LANGUAGE:ko}
atlas.youtube.max-results-per-category=50
atlas.youtube.cache.categories-ttl-seconds=${YOUTUBE_CATEGORIES_CACHE_TTL_SECONDS:21600}
atlas.youtube.cache.video-sections-ttl-seconds=${YOUTUBE_VIDEO_SECTIONS_CACHE_TTL_SECONDS:120}
atlas.youtube.cache.categories-max-size=${YOUTUBE_CATEGORIES_CACHE_MAX_SIZE:128}
atlas.youtube.cache.video-sections-max-size=${YOUTUBE_VIDEO_SECTIONS_CACHE_MAX_SIZE:512}
atlas.youtube.shorts-max-duration-seconds=180

atlas.realtime.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://youtube-atlas.vercel.app,https://*.vercel.app}
atlas.auth.google-client-id=${GOOGLE_CLIENT_ID:}
atlas.auth.google-client-secret=${GOOGLE_CLIENT_SECRET:}
atlas.auth.google-token-url=${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
atlas.auth.google-token-info-url=${GOOGLE_TOKEN_INFO_URL:https://oauth2.googleapis.com/tokeninfo}
atlas.auth.session-ttl-days=${AUTH_SESSION_TTL_DAYS:30}
atlas.admin.allowed-emails=${ADMIN_ALLOWED_EMAILS:}

atlas.game.scheduler-enabled=${GAME_SCHEDULER_ENABLED:false}
atlas.game.cron=${GAME_SETTLEMENT_CRON:0 */5 * * * *}

atlas.trending.scheduler-enabled=${TRENDING_SCHEDULER_ENABLED:true}
atlas.trending.cron=${TRENDING_SYNC_CRON:0 0 * * * *}
atlas.trending.sync-max-pages-per-source=${TRENDING_SYNC_MAX_PAGES_PER_SOURCE:4}
atlas.trending.retention-days=${TRENDING_RETENTION_DAYS:30}

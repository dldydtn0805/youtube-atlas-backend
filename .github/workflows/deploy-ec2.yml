name: Deploy backend to EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - ec2
      - youtube-atlas-backend

    steps:
      - name: Deploy on EC2
        run: |
          set -euo pipefail
          cd /home/ec2-user/youtube-atlas-backend

          git fetch --prune origin
          git checkout master
          git reset --hard origin/master

          read_env_last() {
            local key="$1"
            awk -v key="$key" 'BEGIN{FS="="} $1==key {value=$0; sub(/^[^=]*=/,"",value)} END{print value}' .env \
              | sed 's/^"//; s/"$//'
          }

          DB_URL="$(read_env_last AWS_DB_URL)"
          DB_USERNAME="$(read_env_last AWS_DB_USERNAME)"
          DB_PASSWORD="$(read_env_last AWS_DB_PASSWORD)"

          if [ -z "$DB_URL" ]; then
            DB_URL="$(read_env_last SPRING_DATASOURCE_URL)"
          fi
          if [ -z "$DB_URL" ]; then
            DB_URL="$(read_env_last DB_URL)"
          fi
          if [ -z "$DB_USERNAME" ]; then
            DB_USERNAME="$(read_env_last SPRING_DATASOURCE_USERNAME)"
          fi
          if [ -z "$DB_USERNAME" ]; then
            DB_USERNAME="$(read_env_last DB_USERNAME)"
          fi
          if [ -z "$DB_PASSWORD" ]; then
            DB_PASSWORD="$(read_env_last SPRING_DATASOURCE_PASSWORD)"
          fi
          if [ -z "$DB_PASSWORD" ]; then
            DB_PASSWORD="$(read_env_last DB_PASSWORD)"
          fi

          if [ -z "$DB_URL" ] || [ -z "$DB_USERNAME" ] || [ -z "$DB_PASSWORD" ]; then
            echo "DB connection env is missing in /home/ec2-user/youtube-atlas-backend/.env" >&2
            exit 1
          fi

          DB_PSQL_URL="${DB_URL#jdbc:}"

          sudo docker run --rm \
            -e PGPASSWORD="$DB_PASSWORD" \
            -v "$PWD/sql:/sql:ro" \
            postgres:18 \
            psql "$DB_PSQL_URL" -U "$DB_USERNAME" -v ON_ERROR_STOP=1 -f /sql/migrate_game_achievement_titles.sql

          sudo docker builder prune -af || true
          sudo docker system prune -af || true
          sudo docker build -t youtube-atlas-backend:latest .
          sudo docker rm -f youtube-atlas-backend || true
          sudo docker run -d \
            --name youtube-atlas-backend \
            --restart unless-stopped \
            --env-file .env \
            -p 8080:8080 \
            youtube-atlas-backend:latest

          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:8080/api/trending/realtime-surging?regionCode=KR' >/dev/null; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($attempt/30)"
            sleep 2
          done

          if ! curl -fsS 'http://127.0.0.1:8080/api/trending/realtime-surging?regionCode=KR' >/dev/null; then
            echo "Backend did not become healthy in time"
            sudo docker logs --tail 120 youtube-atlas-backend
            exit 1
          fi

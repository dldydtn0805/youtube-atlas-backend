name: Deploy backend to EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - ec2
      - youtube-atlas-backend

    steps:
      - name: Deploy on EC2
        run: |
          set -euo pipefail
          cd /home/ec2-user/youtube-atlas-backend

          git fetch --prune origin
          git checkout master
          git reset --hard origin/master

          sudo docker build -t youtube-atlas-backend:latest .
          sudo docker rm -f youtube-atlas-backend || true
          sudo docker run -d \
            --name youtube-atlas-backend \
            --restart unless-stopped \
            --env-file .env \
            -p 8080:8080 \
            youtube-atlas-backend:latest

          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:8080/api/trending/realtime-surging?regionCode=KR' >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($attempt/30)"
            sleep 2
          done

          echo "Backend did not become healthy in time"
          sudo docker logs --tail 120 youtube-atlas-backend
          exit 1
